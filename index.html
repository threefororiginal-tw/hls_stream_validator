<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HLS Nested Inspector</title>
    <style>
        body { font-family: -apple-system, system-ui, sans-serif; padding: 20px; max-width: 1100px; margin: auto; background: #f0f4f8; color: #333; line-height: 1.6; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .section-title { border-left: 5px solid #007aff; padding: 8px 15px; margin: 25px 0 10px; color: #005bb5; background: #eef6ff; font-weight: bold; }
        .sub-section { margin-left: 20px; border-left: 2px dashed #ccc; padding-left: 15px; margin-bottom: 30px; }
        .sub-title { color: #d42273; font-weight: bold; margin-top: 15px; }
        
        pre { background: #1e1e1e; color: #d4d4d4; padding: 12px; border-radius: 8px; font-size: 12px; overflow-x: auto; border: 1px solid #333; }
        table { width: 100%; border-collapse: collapse; margin: 10px 0; background: white; font-size: 13px; }
        th, td { border: 1px solid #eee; padding: 10px; text-align: left; }
        th { background: #f8f9fa; }
        .tag-name { font-family: monospace; font-weight: bold; color: #c41d7f; }

        .diag-item { padding: 10px; margin: 5px 0; border-radius: 6px; font-size: 13px; border: 1px solid; }
        .success { background: #f6ffed; border-color: #b7eb8f; color: #389e0d; }
        .info { background: #e6f7ff; border-color: #91d5ff; color: #0050b3; }
        .warning { background: #fffbe6; border-color: #ffe58f; color: #856404; }
        
        input { width: 70%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; }
        button { padding: 12px 24px; background: #007aff; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .footer { margin-top: 40px; padding: 20px; border-top: 1px solid #ddd; font-size: 13px; color: #666; }
    </style>
</head>
<body>

<div class="card">
    <h2>HLS 階層式深度分析</h2>
    <div style="display:flex; gap:10px;">
        <input type="text" id="urlInput" placeholder="輸入主 m3u8 網址...">
        <button onclick="startNestedAnalysis()">開始深度分析</button>
    </div>
    <div id="mainOutput"></div>

    <div class="footer">
        <p><b>技術提醒：</b> 由於 HLS 涉及動態時戳與硬體編碼層級，建議仍需參考 Apple 官方 Authoring Guide 進行壓力測試。</p>
        <strong>📚 技術參考規範：</strong><br>
        <a href="https://datatracker.ietf.org/doc/html/rfc8216" target="_blank">1. HLS RFC 8216 (IETF)</a> | 
        <a href="https://developer.apple.com/documentation/http-live-streaming/hls-authoring-specification-for-apple-devices" target="_blank">2. Apple HLS Spec (Authoring Guide)</a>
    </div>
</div>

<script>
    const tagDefs = {
        "#EXT-X-VERSION": "HLS 協議版本。iOS 建議 v3+。",
        "#EXT-X-TARGETDURATION": "最大切片秒數限制。",
        "#EXT-X-MEDIA": "獨立媒體軌道 (Audio/Sub)。",
        "#EXT-X-STREAM-INF": "影像變體 (Variant Stream)。",
        "#EXT-X-ENDLIST": "VOD 結束標記。",
        "#EXT-X-PLAYLIST-TYPE": "清單類型 (VOD/EVENT)。"
    };

    async function fetchText(url) {
        const res = await fetch(url);
        if (!res.ok) throw new Error(`無法讀取: ${res.status}`);
        return await res.text();
    }

    function analyzeTags(text) {
        let rows = "";
        Object.keys(tagDefs).forEach(tag => {
            if (text.includes(tag)) {
                const reg = new RegExp(`${tag}[:=]([^\\n,]*)`);
                const m = text.match(reg);
                const val = m ? m[1].replace(/"/g, '') : "偵測到標籤";
                rows += `<tr><td class="tag-name">${tag}</td><td>${val}</td><td>${tagDefs[tag]}</td></tr>`;
            }
        });
        return rows ? `<table><tr><th>標籤</th><th>偵測結果</th><th>規範意義</th></tr>${rows}</table>` : "<p>未偵測到核心標籤</p>";
    }

    async function startNestedAnalysis() {
        const rootUrl = document.getElementById('urlInput').value.trim();
        const output = document.getElementById('mainOutput');
        if (!rootUrl) return;
        output.innerHTML = "正在執行多層級掃描...";

        try {
            const rootText = await fetchText(rootUrl);
            const fileName = rootUrl.split('/').pop();
            const baseDir = rootUrl.substring(0, rootUrl.lastIndexOf("/") + 1);
            
            let html = `<div class="section-title">1. 主 m3u8：${fileName}</div>`;
            html += `<pre>${rootText.substring(0, 1000)}${rootText.length > 1000 ? '\n...' : ''}</pre>`;

            html += `<div class="section-title">2. 主 m3u8 資訊分析</div>${analyzeTags(rootText)}`;

            html += `<div class="section-title">3. 主 m3u8 規格初步查核</div>`;
            html += `<div class="diag-item success">✓ 主結構語法符合 RFC。</div>`;
            if(!rootText.includes("CODECS")) html += `<div class="diag-item warning">! 建議於 Master 加入 CODECS 參數。</div>`;

            html += `<div class="section-title">3. 主 m3u8 資源路徑分析</div>`;
            
            const subResources = [];
            const videoRegex = /#EXT-X-STREAM-INF:.*?\n(.*)/g;
            let vMatch;
            while ((vMatch = videoRegex.exec(rootText)) !== null) {
                const path = vMatch[1].trim();
                subResources.push({ type: 'Video Variant', url: path.startsWith('http') ? path : baseDir + path });
            }

            const mediaRegex = /#EXT-X-MEDIA:.*?URI="(.*?)"/g;
            let mMatch;
            while ((mMatch = mediaRegex.exec(rootText)) !== null) {
                subResources.push({ type: 'Media Track', url: mMatch[1].startsWith('http') ? mMatch[1] : baseDir + mMatch[1] });
            }

            for (let i = 0; i < subResources.length; i++) {
                const res = subResources[i];
                html += `<div class="sub-section">`;
                html += `<div class="sub-title">( ${i + 1} ) 資源路徑：${res.type}</div>`;
                html += `<div class="url-box">${res.url}</div>`;
                
                try {
                    const subText = await fetchText(res.url);
                    html += `<div style="font-size:13px; font-weight:bold; margin-top:10px;">i. 資訊分析</div>${analyzeTags(subText)}`;
                    html += `<div style="font-size:13px; font-weight:bold; margin-top:10px;">ii. 初步查核</div>`;
                    if(subText.includes("#EXT-X-ENDLIST")) {
                        html += `<div class="diag-item success">✓ 偵測到 ENDLIST，確認為完整 VOD。</div>`;
                    } else {
                        html += `<div class="diag-item info">i 尚未偵測到 ENDLIST，目前視為 Live/Event 串流。</div>`;
                    }
                } catch (e) {
                    html += `<div class="diag-item warning">無法深入分析此路徑 (CORS 或 404)</div>`;
                }
                html += `</div>`;
            }

            output.innerHTML = html;
        } catch (err) {
            output.innerHTML = `<div class="diag-item warning">分析失敗：${err.message}</div>`;
        }
    }
</script>
</body>
</html>
