<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HLS Specialist v202603301205</title>
    <style>
        .version-tag { font-size: 11px; color: #aaa; text-align: right; font-family: monospace; padding-bottom: 5px; }
        body { font-family: -apple-system, system-ui, sans-serif; padding: 15px; max-width: 1200px; margin: auto; background: #f4f7f9; color: #333; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        
        .section-title { border-left: 5px solid #007aff; padding: 8px 15px; margin: 25px 0 10px; color: #005bb5; background: #eef6ff; font-weight: bold; }
        
        /* 輸入與歷史選單佈局 */
        .controls { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; }
        .input-group { display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
        button#mainBtn { padding: 12px 24px; background: #007aff; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        
        select#historySelect { padding: 10px; border-radius: 8px; border: 1px solid #ccc; background: #fafafa; font-size: 13px; color: #555; width: 100%; }

        /* 表格樣式 */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; table-layout: fixed; background: white; }
        th, td { border: 1px solid #eee; padding: 12px; text-align: left; vertical-align: top; font-size: 13px; }
        th { background: #f8f9fa; width: 180px; }

        .item-row { padding: 10px; border-bottom: 1px solid #f0f0f0; cursor: pointer; border-radius: 6px; border: 1px solid transparent; }
        .item-row:hover { background: #e6f7ff; }
        
        .url-container { display: none; margin-top: 8px; padding: 12px; background: #1e1e1e; color: #d4d4d4; border-radius: 6px; position: relative; }
        .copy-btn { position: absolute; right: 8px; top: 8px; padding: 4px 8px; background: #007aff; color: white; border: none; border-radius: 4px; font-size: 11px; cursor: pointer; }
        .url-text { font-family: monospace; font-size: 11px; word-break: break-all; white-space: pre-wrap; padding-right: 60px; display: block; }

        .footer { font-size: 12px; color: #777; margin-top: 30px; border-top: 1px solid #ddd; padding-top: 10px; }
    </style>
</head>
<body>

<div class="card">
    <div class="version-tag">Build 202603301205</div>
    <h2>HLS 階層式深度分析儀</h2>
    
    <div class="controls">
        <select id="historySelect" onchange="useHistory()">
            <option value="">-- 先前記錄 (最近 24 小時) --</option>
        </select>
        
        <div class="input-group">
            <input type="text" id="urlInput" placeholder="請貼上 .m3u8 網址...">
            <button id="mainBtn" onclick="startAnalysis()">執行技術分析</button>
        </div>
    </div>

    <div id="mainOutput"></div>
</div>

<script>
    const COOKIE_NAME = "hls_history";

    // 初始化：載入歷史紀錄
    window.onload = function() {
        renderHistory();
    };

    function toggleDisplay(id) {
        const el = document.getElementById(id);
        el.style.display = (el.style.display === 'block') ? 'none' : 'block';
    }

    // Cookie 操作：儲存紀錄
    function saveToHistory(url) {
        let history = getHistory();
        const now = new Date();
        const timeStr = now.getFullYear() + "-" + 
                        String(now.getMonth() + 1).padStart(2, '0') + "-" + 
                        String(now.getDate()).padStart(2, '0') + " " + 
                        String(now.getHours()).padStart(2, '0') + ":" + 
                        String(now.getMinutes()).padStart(2, '0') + ":" + 
                        String(now.getSeconds()).padStart(2, '0');
        
        // 移除重複的網址，保持最新
        history = history.filter(item => item.url !== url);
        history.unshift({ time: timeStr, url: url });
        
        // 只存最近 20 筆避免 Cookie 過大
        if (history.length > 20) history.pop();
        
        // 設定過期時間為 1 天 (86400秒)
        const expires = new Date(Date.now() + 86400 * 1000).toUTCString();
        document.cookie = `${COOKIE_NAME}=${encodeURIComponent(JSON.stringify(history))}; expires=${expires}; path=/; SameSite=Lax`;
        
        renderHistory();
    }

    function getHistory() {
        const name = COOKIE_NAME + "=";
        const ca = document.cookie.split(';');
        for(let i = 0; i < ca.length; i++) {
            let c = ca[i].trim();
            if (c.indexOf(name) === 0) {
                return JSON.parse(decodeURIComponent(c.substring(name.length, c.length)));
            }
        }
        return [];
    }

    function renderHistory() {
        const select = document.getElementById("historySelect");
        const history = getHistory();
        select.innerHTML = '<option value="">-- 先前記錄 (最近 24 小時) --</option>';
        history.forEach(item => {
            const option = document.createElement("option");
            option.value = item.url;
            option.text = `${item.time} ${item.url}`;
            select.appendChild(option);
        });
    }

    function useHistory() {
        const select = document.getElementById("historySelect");
        if (select.value) {
            document.getElementById("urlInput").value = select.value;
        }
    }

    async function copyToClipboard(text, btnId) {
        await navigator.clipboard.writeText(text);
        const btn = document.getElementById(btnId);
        btn.innerText = "已複製";
        setTimeout(() => { btn.innerText = "複製"; }, 2000);
    }

    async function startAnalysis() {
        const url = document.getElementById('urlInput').value.trim();
        if (!url) return;
        
        saveToHistory(url); // 儲存至 Cookie
        
        const output = document.getElementById('mainOutput');
        output.innerHTML = "<p>分析中...</p>";

        try {
            const response = await fetch(url);
            const text = await response.text();
            const baseDir = url.substring(0, url.lastIndexOf("/") + 1);
            let html = "";

            // 1. 原始碼
            html += `<div class="section-title">1. 主 m3u8 原始碼</div>`;
            html += `<div class="clickable-box" style="border:1px solid #ddd; padding:10px; cursor:pointer;" onclick="toggleDisplay('rawSrc')">▶ 展開內容</div>`;
            html += `<pre id="rawSrc" style="display:none; background:#1e1e1e; color:#ccc; padding:15px; font-size:12px; white-space:pre-wrap; word-break:break-all;">${text.replace(/</g,'&lt;')}</pre>`;

            // 2. 資訊分析
            html += `<div class="section-title">2. 主 m3u8 資訊分析</div><table>`;
            
            const ver = text.match(/#EXT-X-VERSION:(\d+)/);
            html += `<tr><th>#EXT-X-VERSION</th><td>${ver?ver[1]:'N/A'}</td></tr>`;

            const mediaLines = text.match(/#EXT-X-MEDIA:.*/g) || [];
            let mHtml = "";
            mediaLines.forEach((line, idx) => {
                const name = line.match(/NAME="([^"]*)"/)?.[1] || "未命名";
                const lang = line.match(/LANGUAGE="([^"]*)"/)?.[1] || "未知";
                const uri = line.match(/URI="([^"]*)"/)?.[1];
                const fullUri = uri ? (uri.startsWith('http') ? uri : baseDir + uri) : "N/A";
                mHtml += `<div class="item-row" onclick="toggleDisplay('m-${idx}')"><b>${name}</b> [${lang}]<div id="m-${idx}" class="url-container" onclick="event.stopPropagation()"><button class="copy-btn" onclick="copyToClipboard('${fullUri}','mb-${idx}')" id="mb-${idx}">複製</button><span class="url-text">${fullUri}</span></div></div>`;
            });
            html += `<tr><th>媒體軌道</th><td>${mHtml || '無'}</td></tr>`;

            const streamMatches = text.matchAll(/#EXT-X-STREAM-INF:(.*?)\n(.*)/g);
            let vHtml = "";
            let vIdx = 0;
            for (const m of streamMatches) {
                const path = m[2].trim();
                const res = m[1].match(/RESOLUTION=(\d+x\d+)/)?.[1] || "畫質未知";
                const fullPath = path.startsWith('http') ? path : baseDir + path;
                vHtml += `<div class="item-row" onclick="toggleDisplay('v-${vIdx}')"><b>變體 ${vIdx+1}</b> (${res})<div id="v-${vIdx}" class="url-container" onclick="event.stopPropagation()"><button class="copy-btn" onclick="copyToClipboard('${fullPath}','vb-${vIdx}')" id="vb-${vIdx}">複製</button><span class="url-text">${fullPath}</span></div></div>`;
                vIdx++;
            }
            html += `<tr><th>影像變體</th><td>${vHtml || '無'}</td></tr></table>`;

            output.innerHTML = html;
        } catch (err) {
            output.innerHTML = "分析失敗：" + err.message;
        }
    }
</script>
</body>
</html>
