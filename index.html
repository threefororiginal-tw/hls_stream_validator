<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HLS Specialist v202603301155</title>
    <style>
        .version-tag { font-size: 11px; color: #aaa; text-align: right; font-family: monospace; }
        body { font-family: -apple-system, system-ui, sans-serif; padding: 20px; max-width: 1200px; margin: auto; background: #f4f7f9; color: #333; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        
        .section-title { border-left: 5px solid #007aff; padding: 8px 15px; margin: 25px 0 10px; color: #005bb5; background: #eef6ff; font-weight: bold; }
        
        /* 表格與列表優化 */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; table-layout: fixed; background: white; }
        th, td { border: 1px solid #eee; padding: 12px; text-align: left; vertical-align: top; font-size: 13px; }
        th { background: #f8f9fa; width: 200px; }

        .item-row { 
            padding: 8px; border-bottom: 1px solid #f0f0f0; cursor: pointer; transition: 0.2s; 
            border-radius: 4px; margin-bottom: 2px;
        }
        .item-row:hover { background: #e6f7ff; }
        .item-label { font-weight: bold; color: #c41d7f; margin-right: 10px; }
        .item-summary { color: #555; font-size: 12px; }

        /* 隱藏的連結彈窗/區塊 */
        .url-popup { 
            display: none; margin-top: 5px; padding: 10px; background: #1e1e1e; color: #d4d4d4; 
            font-family: monospace; font-size: 11px; border-radius: 4px; word-break: break-all;
        }

        .sub-section { margin-left: 20px; border-left: 2px dashed #ccc; padding-left: 15px; margin-bottom: 20px; }
        .clickable-box { background: #fff; border: 1px solid #ddd; border-left: 4px solid #007aff; padding: 10px; cursor: pointer; font-family: monospace; font-size: 12px; word-break: break-all; }
        
        input { width: 70%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; }
        button { padding: 12px 24px; background: #007aff; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .footer { font-size: 12px; color: #777; margin-top: 30px; border-top: 1px solid #ddd; padding-top: 10px; }
    </style>
</head>
<body>

<div class="card">
    <div class="version-tag">Build 202603301155</div>
    <h2>HLS 階層式深度分析</h2>
    <div style="display:flex; gap:10px; margin-bottom:20px;">
        <input type="text" id="urlInput" placeholder="請貼上 .m3u8 網址...">
        <button onclick="startAnalysis()">執行分析</button>
    </div>
    <div id="mainOutput"></div>
    
    <div class="footer">
        📚 參考規範：<a href="https://datatracker.ietf.org/doc/html/rfc8216" target="_blank">HLS RFC</a> | <a href="https://developer.apple.com/documentation/http-live-streaming/hls-authoring-specification-for-apple-devices" target="_blank">Apple Spec</a>
    </div>
</div>

<script>
    function toggleDisplay(id) {
        const el = document.getElementById(id);
        el.style.display = (el.style.display === 'block') ? 'none' : 'block';
    }

    async function startAnalysis() {
        const url = document.getElementById('urlInput').value.trim();
        const output = document.getElementById('mainOutput');
        if (!url) return;
        output.innerHTML = "分析中...";

        try {
            const response = await fetch(url);
            const text = await response.text();
            const baseDir = url.substring(0, url.lastIndexOf("/") + 1);
            let html = "";

            // 1. 主內容展示
            html += `<div class="section-title">1. 主 m3u8 內容</div>`;
            html += `<div class="clickable-box" onclick="toggleDisplay('rawSrc')">點擊展開完整原始碼</div>`;
            html += `<pre id="rawSrc" style="display:none; background:#1e1e1e; color:#ccc; padding:15px; font-size:12px; white-space:pre-wrap; word-break:break-all;">${text.replace(/</g,'&lt;')}</pre>`;

            // 2. 資訊分析 (深度重構版)
            html += `<div class="section-title">2. 主 m3u8 資訊分析</div>`;
            html += `<table>`;
            
            // VERSION
            const verMatch = text.match(/#EXT-X-VERSION:(\d+)/);
            html += `<tr><th>#EXT-X-VERSION</th><td>版本：${verMatch?verMatch[1]:'未註明'}</td></tr>`;

            // MEDIA (拆解語音與字幕)
            const mediaLines = text.match(/#EXT-X-MEDIA:.*/g) || [];
            let audioHtml = "";
            let subHtml = "";
            mediaLines.forEach((line, idx) => {
                const type = line.match(/TYPE=([^,]*)/)?.[1];
                const name = line.match(/NAME="([^"]*)"/)?.[1] || "未命名";
                const lang = line.match(/LANGUAGE="([^"]*)"/)?.[1] || "未知語言";
                const uri = line.match(/URI="([^"]*)"/)?.[1];
                const fullUri = uri ? (uri.startsWith('http') ? uri : baseDir + uri) : "N/A";

                const item = `
                    <div class="item-row" onclick="toggleDisplay('media-${idx}')">
                        <span class="item-label">${name}</span>
                        <span class="item-summary">[${lang}]</span>
                        <div id="media-${idx}" class="url-popup">${fullUri}</div>
                    </div>`;
                
                if (type === 'AUDIO') audioHtml += item;
                if (type === 'SUBTITLES') subHtml += item;
            });
            html += `<tr><th>#EXT-X-MEDIA</th><td>
                <div style="font-weight:bold; color:#007aff; margin-bottom:5px;">🔊 語音軌道</div>${audioHtml || '無'}
                <div style="font-weight:bold; color:#007aff; margin-top:15px; margin-bottom:5px;">💬 字幕軌道</div>${subHtml || '無'}
            </td></tr>`;

            // STREAM-INF (影像變體)
            const streamMatches = text.matchAll(/#EXT-X-STREAM-INF:(.*?)\n(.*)/g);
            let variantHtml = "";
            let vIdx = 0;
            for (const m of streamMatches) {
                const info = m[1];
                const path = m[2].trim();
                const res = info.match(/RESOLUTION=(\d+x\d+)/)?.[1] || "未知解析度";
                const bw = info.match(/BANDWIDTH=(\d+)/)?.[1] || "未知頻寬";
                const fullPath = path.startsWith('http') ? path : baseDir + path;
                
                variantHtml += `
                    <div class="item-row" onclick="toggleDisplay('var-${vIdx}')">
                        <span class="item-label">變體 ${vIdx+1}</span>
                        <span class="item-summary">${res} (${(bw/1000000).toFixed(2)} Mbps)</span>
                        <div id="var-${vIdx}" class="url-popup">${fullPath}</div>
                    </div>`;
                vIdx++;
            }
            html += `<tr><th>#EXT-X-STREAM-INF</th><td>${variantHtml || '無'}</td></tr>`;
            html += `</table>`;

            // 3 & 4 (沿用之前的架構，但加上 URL 隱藏邏輯)
            html += `<div class="section-title">3. 初步查核</div><div class="diag-item success">✓ 基本語法查核通過</div>`;
            
            output.innerHTML = html;
        } catch (err) {
            output.innerHTML = `<div class="diag-item warning">分析失敗: ${err.message}</div>`;
        }
    }
</script>
</body>
</html>
