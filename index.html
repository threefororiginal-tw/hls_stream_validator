<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HLS Professional Inspector</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>

<div class="card">
    <div class="version-tag">Build 202603301300 (Modular)</div>
    <h2>HLS 階層式深度分析儀</h2>
    
    <div class="controls">
        <select id="historySelect">
            <option value="">-- 先前測試紀錄 (保留 24 小時) --</option>
        </select>
        
        <div class="input-group">
            <input type="text" id="urlInput" placeholder="請貼上 Master 或 Media .m3u8 網址...">
            <button id="mainBtn">執行技術分析</button>
        </div>
    </div>

    <div id="mainOutput"></div>
</div>

<div class="footer">
    <p><b>💡 專業觀點提醒：</b> 由於 HLS 涉及動態時戳與硬體解碼相容性，靜態檢查通過後，建議仍需參考 Apple 官方規範進行 <code>AVPlayer</code> 實機測試。</p>
    <div class="footer-links">
        📚 參考規範：
        <a href="https://datatracker.ietf.org/doc/html/rfc8216" target="_blank">1. HLS RFC 8216 (IETF)</a> | 
        <a href="https://developer.apple.com/documentation/http-live-streaming/hls-authoring-specification-for-apple-devices" target="_blank">2. Apple HLS Authoring Spec</a>
    </div>
</div>

<script type="module" src="./js/main.js"></script>
</body>
</html>
